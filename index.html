<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Ventas – Feria</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#fdf6ec;--warm:#f5e8d0;--coral:#e8613a;--green:#2d6a4f;--gold:#c9a84c;--pink:#d96b8f;--dark:#1a1209;--mid:#5c4a2a;--light:#fff9f2;--shadow:0 4px 24px rgba(26,18,9,.13);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}

  #loading{position:fixed;inset:0;background:var(--dark);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  #loading .spin{width:44px;height:44px;border:4px solid #2e2013;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading p{color:var(--gold);font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;}

  header{background:var(--dark);color:var(--cream);padding:18px 24px 14px;display:flex;align-items:center;gap:14px;border-bottom:4px solid var(--gold);}
  header h1{font-family:'Playfair Display',serif;font-size:1.5rem;line-height:1.1;}
  header .sub{font-size:.75rem;color:var(--gold);font-weight:600;letter-spacing:.12em;text-transform:uppercase;display:block;margin-top:2px;}
  .icon-hat{font-size:2rem;}
  .sync-badge{display:inline-flex;align-items:center;gap:6px;background:#1a3a2a;color:#4ade80;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-left:auto;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .summary{display:flex;gap:12px;padding:14px 20px;background:var(--dark);border-bottom:2px solid #2e2013;flex-wrap:wrap;}
  .stat{flex:1;min-width:90px;background:#2e2013;border-radius:10px;padding:10px 14px;text-align:center;}
  .stat .val{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--gold);line-height:1;}
  .stat .lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#b09a75;margin-top:3px;}

  main{padding:20px 16px 40px;max-width:700px;margin:0 auto;}
  h2.section-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--mid);margin:24px 0 12px;border-left:4px solid var(--coral);padding-left:10px;}

  .product-card{background:var(--light);border-radius:14px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;border:1.5px solid #eddfc8;}
  .product-header{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--warm);border-bottom:1.5px solid #eddfc8;}
  .product-emoji{font-size:2.2rem;}
  .product-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--dark);}
  .product-total{margin-left:auto;font-size:.75rem;font-weight:600;color:var(--mid);text-align:right;line-height:1.4;}
  .product-total .big{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--coral);display:block;}

  .sizes-grid{display:grid;grid-template-columns:repeat(4,1fr);padding:14px 16px;border-bottom:1.5px solid #eddfc8;}
  .size-cell{text-align:center;padding:6px 4px;}
  .size-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:#9e8060;font-weight:600;margin-bottom:4px;}
  .size-stock{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--dark);line-height:1;}
  .size-stock.low{color:var(--coral);}
  .size-stock.zero{color:#ccc;text-decoration:line-through;}
  .size-orig{font-size:.65rem;color:#b5997a;margin-top:1px;}
  .size-btn-row{display:flex;gap:4px;justify-content:center;margin-top:5px;}
  .btn-sell{background:var(--coral);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:background .15s;}
  .btn-sell:hover{background:#c94e2a;}
  .btn-sell:disabled{background:#ddd;color:#aaa;cursor:not-allowed;}
  .btn-undo{background:transparent;color:var(--mid);border:1.5px solid #ddd;border-radius:6px;padding:4px 8px;font-size:.65rem;cursor:pointer;}
  .btn-undo:hover{border-color:var(--mid);}

  /* Filtros */
  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .btn-filter{background:white;border:1.5px solid #ddd;border-radius:20px;padding:6px 14px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--mid);transition:all .15s;}
  .btn-filter.active{background:var(--coral);color:white;border-color:var(--coral);}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,9,.55);z-index:100;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--light);border-radius:18px;padding:26px 22px 22px;width:100%;max-width:380px;box-shadow:0 16px 60px rgba(0,0,0,.35);border:2px solid var(--gold);animation:popIn .2s ease;}
  @keyframes popIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal h3{font-family:'Playfair Display',serif;font-size:1.15rem;margin-bottom:4px;}
  .modal .ctx{font-size:.8rem;color:var(--mid);margin-bottom:18px;}
  .modal label{font-size:.75rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;margin-top:14px;}
  .modal input{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid #ddd;font-size:.9rem;font-family:'DM Sans',sans-serif;background:white;outline:none;}
  .modal input:focus{border-color:var(--coral);}
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .btn-confirm{flex:1;background:var(--coral);color:white;border:none;border-radius:10px;padding:12px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-confirm:hover{background:#c94e2a;}
  .btn-cancel{flex:.5;background:transparent;color:var(--mid);border:1.5px solid #ddd;border-radius:10px;padding:12px;font-size:.9rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .qty-input{display:flex;align-items:center;gap:10px;}
  .qty-input input{text-align:center;width:70px;}
  .qty-btn{background:var(--warm);border:1.5px solid #ddd;border-radius:8px;width:36px;height:36px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  .log-entry{background:white;border-radius:10px;padding:10px 14px;margin-bottom:8px;border-left:4px solid var(--green);box-shadow:0 2px 8px rgba(0,0,0,.05);font-size:.82rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
  .log-entry .log-left{line-height:1.5;}
  .log-entry .log-time{font-size:.7rem;color:#aaa;white-space:nowrap;}
  .log-empty{color:#bbb;font-size:.85rem;text-align:center;padding:20px 0;}
  .tag-design{display:inline-block;font-size:.65rem;background:var(--gold);color:var(--dark);border-radius:5px;padding:2px 7px;font-weight:700;text-transform:uppercase;margin-right:4px;}
  .tag-size{display:inline-block;font-size:.65rem;background:var(--pink);color:white;border-radius:5px;padding:2px 7px;font-weight:700;margin-right:4px;}

  .btn-export{display:block;width:100%;background:var(--green);color:white;border:none;border-radius:12px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;letter-spacing:.04em;transition:background .15s;}
  .btn-export:hover{background:#1f4f39;}
  .btn-manual{display:block;width:100%;background:var(--gold);color:var(--dark);border:none;border-radius:12px;padding:11px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:14px;letter-spacing:.03em;}
  .btn-manual:hover{background:#b8942e;}
  .tag-manual{display:inline-block;font-size:.6rem;background:#aaa;color:white;border-radius:4px;padding:1px 6px;font-weight:700;margin-right:4px;vertical-align:middle;}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <p>Conectando con Firebase…</p>
</div>

<header>
  <span class="icon-hat">🎪</span>
  <div>
    <h1>Control de Ventas</h1>
    <span class="sub">Camisetas · Feria de Córdoba</span>
  </div>
  <div class="sync-badge"><span class="sync-dot"></span>En vivo</div>
</header>

<div class="summary">
  <div class="stat"><div class="val" id="stat-total">—</div><div class="lbl">Inventario</div></div>
  <div class="stat"><div class="val" id="stat-vendidas">—</div><div class="lbl">Vendidas</div></div>
  <div class="stat"><div class="val" id="stat-restantes">—</div><div class="lbl">Disponibles</div></div>
</div>

<main>
  <h2 class="section-title">📦 Stock por referencia</h2>
  <div id="products-container"></div>

  <h2 class="section-title">📋 Registro de ventas</h2>
  <button class="btn-manual" onclick="openManual()">✏️ Agregar registro sin descontar stock</button>
  <div class="filter-row">
    <button class="btn-filter active" onclick="setFilter('hoy')">Hoy</button>
    <button class="btn-filter" onclick="setFilter('semana')">Esta semana</button>
    <button class="btn-filter" onclick="setFilter('todo')">Todo el historial</button>
  </div>
  <div class="log-count" id="log-count"></div>
  <div id="log-container"><p class="log-empty">Cargando…</p></div>
  <button class="btn-export" onclick="exportCSV()">⬇️ Exportar registro a CSV</button>
</main>

<!-- Modal venta normal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Registrar venta</h3>
    <p class="ctx" id="modal-ctx"></p>
    <label>Cantidad</label>
    <div class="qty-input">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <input type="number" id="modal-qty" value="1" min="1">
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <label>Cliente (opcional)</label>
    <input type="text" id="modal-client" placeholder="Nombre, puesto, teléfono…">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmSale()">✔ Confirmar venta</button>
    </div>
  </div>
  .log-count{font-size:.75rem;color:#aaa;margin-bottom:8px;}/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:"AIzaSyC65zzS43GoUNk62cu8tK9Um9FcVKK9aCA",
  authDomain:"control-ventas-camisetas.firebaseapp.com",
  projectId:"control-ventas-camisetas",
  storageBucket:"control-ventas-camisetas.firebasestorage.app",
  messagingSenderId:"685494577410",
  appId:"1:685494577410:web:ee605ff6dbd6c5cf72fa1b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const stockRef  = db.collection('feria').doc('stock');
const ventasCol = db.collection('feria').doc('datos').collection('ventas');

// ── Productos ─────────────────────────────────────────────────
const PRODUCTS = [
  {id:'cordoba', emoji:'🎨', name:'Córdoba – Wepa-je!',        stock:{S:10,M:10,L:5,XL:5}},
  {id:'costena', emoji:'🌴', name:'Mini Costeñita core',        stock:{S:10,M:10,L:5,XL:5}},
  {id:'monteria',emoji:'🌉', name:'Montería – La Villa Soñada', stock:{S:5, M:5, L:5,XL:5}},
];
const SIZES = ['S','M','L','XL'];
const DEFAULT_STOCK = {};
PRODUCTS.forEach(p => { DEFAULT_STOCK[p.id] = {...p.stock}; });

// ── Estado ────────────────────────────────────────────────────
let state    = PRODUCTS.map(p => ({id:p.id, stock:{...p.stock}}));
let allSales = [];   // todos los registros de Firestore
let filtered = [];   // registros mostrados según filtro
let activeFilter = 'hoy';
let pendingAction = null;
let unsubVentas = null;

// ── Migración datos antiguos ──────────────────────────────────
async function migrateOldData() {
  const migRef  = db.collection('feria').doc('migration');
  const migSnap = await migRef.get();
  if (migSnap.exists && migSnap.data().done) return; // ya migrado

  const oldSnap = await db.collection('feria').doc('salesLog').get();
  if (!oldSnap.exists) { await migRef.set({done:true}); return; }

  const entries = oldSnap.data().entries || [];
  if (!entries.length) { await migRef.set({done:true}); return; }

  // Crear un documento por cada venta antigua
  const base = Date.now() - entries.length * 60000;
  const batch = db.batch();
  entries.forEach((e, i) => {
    const doc = ventasCol.doc();
    batch.set(doc, {
      productId:   e.productId,
      size:        e.size,
      qty:         e.qty,
      client:      e.client || '',
      timeDisplay: e.time   || '',
      timestamp:   firebase.firestore.Timestamp.fromDate(new Date(base + i * 60000))
    });
  });
  batch.set(migRef, {
    done: true,
    count: entries.length,
    migratedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  await batch.commit();
  console.log(`✅ Migrados ${entries.length} registros antiguos`);
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  const snap = await stockRef.get();
  if (!snap.exists) await stockRef.set(DEFAULT_STOCK);
  await migrateOldData(); // ← mueve datos viejos al nuevo formato

  // Stock en tiempo real
  stockRef.onSnapshot(s => {
    if (!s.exists) return;
    const d = s.data();
    state = PRODUCTS.map(p => ({id:p.id, stock: d[p.id] ? {...d[p.id]} : {...p.stock}}));
    document.getElementById('loading').style.display = 'none';
    renderProducts(); renderStats();
  });

  // Ventas en tiempo real — colección independiente, orden cronológico
  unsubVentas = ventasCol.orderBy('timestamp','desc').onSnapshot(snap => {
    allSales = snap.docs.map(d => ({id:d.id, ...d.data()}));
    applyFilter();
    renderStats();
  });
}

// ── Filtros ───────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilter();
}

function startOfDay(d)  { const x=new Date(d); x.setHours(0,0,0,0); return x; }
function startOfWeek(d) { const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }

function applyFilter() {
  const now = new Date();
  if (activeFilter === 'hoy') {
    const s = startOfDay(now).getTime();
    filtered = allSales.filter(e => e.timestamp?.toMillis() >= s);
  } else if (activeFilter === 'semana') {
    const s = startOfWeek(now).getTime();
    filtered = allSales.filter(e => e.timestamp?.toMillis() >= s);
  } else {
    filtered = [...allSales];
  }
  renderLog();
}

// ── Helpers ───────────────────────────────────────────────────
function getStock(id, sz) { return (state.find(s=>s.id===id)||{stock:{}}).stock[sz]||0; }
function getOrig(id, sz)  { return (PRODUCTS.find(p=>p.id===id)||{stock:{}}).stock[sz]||0; }
function totalInventory() { return PRODUCTS.reduce((a,p)=>a+SIZES.reduce((b,sz)=>b+p.stock[sz],0),0); }
function totalRemaining() { return state.reduce((a,s)=>a+SIZES.reduce((b,sz)=>b+s.stock[sz],0),0); }
function totalSold()      { return totalInventory() - totalRemaining(); }

// ── Render ────────────────────────────────────────────────────
function renderStats() {
  document.getElementById('stat-total').textContent     = totalInventory();
  document.getElementById('stat-vendidas').textContent  = totalSold();
  document.getElementById('stat-restantes').textContent = totalRemaining();
}

function renderProducts() {
  const c = document.getElementById('products-container');
  c.innerHTML = '';
  PRODUCTS.forEach(p => {
    const st  = state.find(s=>s.id===p.id);
    const rem = SIZES.reduce((a,sz)=>a+st.stock[sz],0);
    const ori = SIZES.reduce((a,sz)=>a+p.stock[sz],0);
    let html = `<div class="product-card">
      <div class="product-header">
        <span class="product-emoji">${p.emoji}</span>
        <span class="product-name">${p.name}</span>
        <div class="product-total"><span class="big">${rem}</span>de ${ori}</div>
      </div>
      <div class="sizes-grid">`;
    SIZES.forEach(sz => {
      const cur=st.stock[sz], or=p.stock[sz];
      const cls=cur===0?'zero':cur<=2?'low':'';
      html+=`<div class="size-cell">
        <div class="size-label">${sz}</div>
        <div class="size-stock ${cls}">${cur}</div>
        <div class="size-orig">/ ${or}</div>
        <div class="size-btn-row">
          <button class="btn-sell" ${cur===0?'disabled':''} onclick="openModal('${p.id}','${sz}')">Vender</button>
          <button class="btn-undo" onclick="undoLast('${p.id}','${sz}')">↩</button>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
    c.innerHTML+=html;
  });
}

function renderLog() {
  const c = document.getElementById('log-container');
  const cnt = document.getElementById('log-count');
  const qtySold = filtered.reduce((a,e)=>a+e.qty,0);
  cnt.textContent = filtered.length
    ? `${filtered.length} registro${filtered.length>1?'s':''} · ${qtySold} unidad${qtySold>1?'es':''} vendida${qtySold>1?'s':''}`
    : '';
  if (!filtered.length) {
    c.innerHTML='<p class="log-empty">No hay ventas en este período.</p>'; return;
  }
  c.innerHTML = filtered.map(e => {
    const p = PRODUCTS.find(pr=>pr.id===e.productId);
    const t = e.timestamp ? e.timestamp.toDate().toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    return `<div class="log-entry">
      <div class="log-left">
        <span class="tag-design">${p?p.name.split('–')[0].trim():e.productId}</span>
        <span class="tag-size">${e.size}</span>
        ${e.manual?'<span class="tag-manual">manual</span>':''}
        <strong>×${e.qty}</strong>
        ${e.client?`· <em>${e.client}</em>`:''}
      </div>
      <div class="log-time">${t}</div>
    </div>`;
  }).join('');
}

// ── Modal manual ──────────────────────────────────────────────
function openManual() {
  // Poner fecha/hora actual como valor por defecto
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('man-date').value = now.toISOString().slice(0,16);
  document.getElementById('man-client').value = '';
  document.getElementById('man-qty').value = 1;
  document.getElementById('modal-manual').classList.add('open');
}
function closeManual() { document.getElementById('modal-manual').classList.remove('open'); }
function changeManQty(d) {
  const i = document.getElementById('man-qty');
  i.value = Math.max(1, (parseInt(i.value)||1) + d);
}
async function confirmManual() {
  const productId = document.getElementById('man-product').value;
  const size      = document.getElementById('man-size').value;
  const qty       = parseInt(document.getElementById('man-qty').value)||1;
  const client    = document.getElementById('man-client').value.trim();
  const dateVal   = document.getElementById('man-date').value;
  if (!dateVal) { alert('Por favor ingresa la fecha y hora.'); return; }
  const ts = firebase.firestore.Timestamp.fromDate(new Date(dateVal));
  await ventasCol.doc().set({
    productId, size, qty, client,
    timestamp: ts,
    manual: true   // marcado para identificarlo en el log
  });
  closeManual();
}

// ── Modal venta normal ────────────────────────────────────────
function openModal(productId, size) {
  pendingAction={productId,size};
  const p=PRODUCTS.find(pr=>pr.id===productId);
  document.getElementById('modal-ctx').textContent=`${p.name} · Talla ${size} · Disponibles: ${getStock(productId,size)}`;
  document.getElementById('modal-qty').value=1;
  document.getElementById('modal-qty').max=getStock(productId,size);
  document.getElementById('modal-client').value='';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');pendingAction=null;}
function changeQty(d){const i=document.getElementById('modal-qty');i.value=Math.max(1,Math.min(parseInt(i.max)||99,(parseInt(i.value)||1)+d));}

async function confirmSale() {
  if (!pendingAction) return;
  const qty    = parseInt(document.getElementById('modal-qty').value)||1;
  const client = document.getElementById('modal-client').value.trim();
  const {productId,size} = pendingAction;
  const avail  = getStock(productId,size);
  if (qty>avail){alert(`Solo quedan ${avail} unidades en talla ${size}.`);return;}

  // Actualizar stock local optimista
  state.find(s=>s.id===productId).stock[size]-=qty;
  renderProducts(); renderStats();
  closeModal();

  // Guardar en Firebase — atómico, sin riesgo de pisarse entre dispositivos
  const batch = db.batch();
  const ventaDoc = ventasCol.doc();
  batch.set(ventaDoc, {
    productId, size, qty, client,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });
  // Decremento atómico — Firestore lo maneja aunque haya varios usuarios simultáneos
  batch.update(stockRef, {
    [`${productId}.${size}`]: firebase.firestore.FieldValue.increment(-qty)
  });
  await batch.commit();
}

async function undoLast(productId, size) {
  // Buscar la venta más reciente de esta referencia/talla
  const recent = allSales.find(e=>e.productId===productId && e.size===size);
  if (!recent){alert('No hay ventas previas para deshacer en esta talla.');return;}
  const newStock = getStock(productId,size)+recent.qty;
  if (newStock>getOrig(productId,size)){alert('No se puede deshacer: excedería el stock original.');return;}

  state.find(s=>s.id===productId).stock[size]=newStock;
  renderProducts(); renderStats();

  const batch=db.batch();
  batch.delete(ventasCol.doc(recent.id));
  batch.update(stockRef, {
    [`${productId}.${size}`]: firebase.firestore.FieldValue.increment(recent.qty)
  });
  await batch.commit();
}

// ── Exportar CSV ──────────────────────────────────────────────
function exportCSV() {
  const data = activeFilter==='todo' ? allSales : filtered;
  if (!data.length){alert('No hay ventas en este período.');return;}
  const header='Diseño,Talla,Cantidad,Cliente,Fecha y Hora\n';
  const rows=data.map(e=>{
    const p=PRODUCTS.find(pr=>pr.id===e.productId);
    const t=e.timestamp?e.timestamp.toDate().toLocaleString('es-CO'):'';
    return `"${p?p.name:e.productId}",${e.size},${e.qty},"${e.client||''}","${t}"`;
  }).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`ventas_feria_${activeFilter}.csv`;a.click();
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('modal-manual').addEventListener('click',e=>{if(e.target===document.getElementById('modal-manual'))closeManual();});
init();
</script>
